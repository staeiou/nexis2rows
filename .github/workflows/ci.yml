name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Node suites. The parser fixtures are copyrighted Nexis exports and are
      # not in the repo, so those assertions skip here and this verifies the
      # XML sanitizer and the UI structure checks.
      - run: npm test

      - run: npx playwright install --with-deps chromium
      # End-to-end against a real build. Without fixtures this covers the empty
      # state and that every wired-up element exists; with them it would also
      # cover import and all three exports.
      - run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
